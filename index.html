<div class="lang-switcher">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('it')">IT</button>
    <button onclick="setLang('pl')">PL</button>
</div>

<header class="hero-section">
    <div class="hero-content">
        <h1 id="title">Maria & Alberto</h1>
        <p id="date" style="font-size: 1.5rem; letter-spacing: 2px;">15 . 08 . 2027</p>
    </div>
</header>

<section id="locations" class="content-section">
    <h2 class="section-title" id="loc-title">The Day</h2>
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/400x250?text=Church+Photo" alt="Church">
            <div class="card-padding">
                <h3 id="church-title">The Ceremony</h3>
                <p id="church-desc">Beautiful details about the church location here.</p>
            </div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/400x250?text=Venue+Photo" alt="Venue">
            <div class="card-padding">
                <h3 id="venue-title">The Party</h3>
                <p id="venue-desc">Details about the cocktail and dinner venue.</p>
            </div>
        </div>
    </div>
</section>

<section id="presents" class="content-section">
    <h2 class="section-title" id="gifts-title">Gifts</h2>
    <div class="card card-padding">
        <p id="gifts-desc">Your love is enough, but if you wish to help us with our honeymoon...</p>
        <p><strong>IBAN:</strong> IT12 3456 7890 1234</p>
    </div>
</section>

<section id="rsvp-section" class="content-section">
    <h2 class="section-title" id="rsvp-title">RSVP</h2>
    <p id="qr-welcome"></p>
    <form id="rsvp-form">
        <input type="hidden" id="guest-id" name="guestId">
        <label id="label-name">Name</label>
        <input type="text" id="name" name="name" required>
        <label id="label-attending">Will you join us?</label>
        <select id="attending" name="attending">
            <option value="yes" id="opt-yes">Yes, I'll be there!</option>
            <option value="no" id="opt-no">No, I can't make it</option>
        </select>
        <button type="submit" id="btn-submit">Confirm RSVP</button>
    </form>
    <p id="form-message"></p>
</section>
