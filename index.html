<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanna & Antonio - Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="lang-switcher">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('it')">IT</button>
        <button onclick="setLang('pl')">PL</button>
    </div>

    <header class="hero-section">
        <div class="hero-content">
            <h1 id="title">Hanna & Antonio</h1>
            <p id="subtitle" class="playfair-italic">Are getting married</p>
            <p class="date">16 . 09 . 2026</p>
        </div>
    </header>

    <section id="locations" class="content-section">
        <h2 class="section-title" id="loc-title">The Day</h2>
        <div class="grid">
            <div class="card" onmouseenter="stopSlider('church')" onmouseleave="startSlider('church')">
                <div class="gallery" id="gallery-church">
                    <img src="st_m_pieta.jpg" alt="Church Santa Maria Della Pietà">
                    <img src="st_m_pieta1.jpg" alt="Church Santa Maria Della Pietà">
                    <img src="st_m_pieta2.jpg" alt="Church Santa Maria Della Pietà">
                    <img src="st_m_pieta3.jpg" alt="Church Santa Maria Della Pietà">
                </div>
                <div class="card-content">
                    <h3 id="church-title">The Ceremony</h3>
                    <p id="church-desc">Santa Maria della Pietà. Starting at 4:00 PM.</p>
                    <button class="btn-history" id="btn-hist-church" onclick="toggleHistory('church')">View
                        History</button>
                    <div id="history-church" class="history-content">
                        <p id="church-history-text"></p>
                    </div>
                    <div class="map-container">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.7240366627!2d13.3678!3d38.1157!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzjCsDA2JzU2LjUiTiAxM8KwMjInMDQuMSJF!5e0!3m2!1sen!2sit!4v1650000000000"
                            width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
            <div class="card" onmouseenter="stopSlider('venue')" onmouseleave="startSlider('venue')">
                <div class="gallery" id="gallery-venue">
                    <img src="baglio_colluzia.jpeg" alt="Baglio Culluzia Exterior">
                    <img src="baglio_colluzia1.jpeg" alt="Baglio Culluzia Exterior">
                    <img src="baglio_colluzia2.png" alt="Baglio Culluzia Exterior">
                    <img src="baglio_colluzia3.jpeg" alt="Baglio Culluzia Exterior">
                </div>
                <div class="card-content">
                    <h3 id="venue-title">The Venue</h3>
                    <p id="venue-desc">Baglio Culluzia, Via Funnuta 9.</p>
                    <button class="btn-history" id="btn-hist-venue" onclick="toggleHistory('venue')">View
                        History</button>
                    <div id="history-venue" class="history-content">
                        <p id="venue-history-text"></p>
                    </div>
                    <div class="map-container">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3152.0234!2d13.3!3d38.1!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzjCsDA2JzU2LjUiTiAxM8KwMjInMDQuMSJF!5e0!3m2!1sen!2sit!4v1650000000000"
                            width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="presents" class="content-section bg-light">
        <h2 class="section-title" id="gifts-title">Gifts & Registry</h2>
        <div class="gifts-card">
            <p id="gifts-desc"></p>
            <div class="classy-iban">
                <p class="iban-header">Wire Transfer Details</p>
                <div class="iban-wrapper">
                    <span id="iban-text">IT00 0000 0000 0000 0000 0000 000</span>
                    <button class="copy-btn" onclick="copyIban()" id="btn-copy">Copy</button>
                </div>
                <p id="copy-confirm" class="copy-toast">Copied to clipboard!</p>
            </div>
        </div>
    </section>

    <section id="rsvp-section" class="content-section">
        <h2 class="section-title" id="rsvp-title">RSVP</h2>

        <div id="manual-id-entry"
            style="display: none; max-width: 450px; margin: 0 auto 30px; background: var(--bg-card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: left;">
            <p id="no-id-text" style="margin-bottom: 20px; font-size: 0.95rem;"></p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="manual-id-input" placeholder="ID (e.g. 4)" style="flex: 1;">
                <button class="btn-history" id="btn-manual-go" onclick="handleManualId()"
                    style="margin: 0; padding: 0 25px; white-space: nowrap;">Go</button>
            </div>
        </div>

        <p id="qr-welcome" class="welcome-message" style="display: none;"></p>
        <p id="loading-message"
            style="display: none; font-style: italic; color: var(--primary-dark); margin-bottom: 20px;"></p>

        <form id="rsvp-form" style="display: none;">
            <div id="family-container"></div>
            <button type="submit" id="btn-submit">Confirm RSVP</button>
            <p id="form-message" style="margin-top: 20px; font-weight: 500;"></p>
        </form>
    </section>

    <script src="script.js"></script>
</body>

</html>
