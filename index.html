<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanna & Antonio - Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="lang-switcher">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('it')">IT</button>
        <button onclick="setLang('pl')">PL</button>
    </div>

    <header class="hero-section">
        <div class="hero-content">
            <h1 id="title">Hanna & Antonio</h1>
            <p id="subtitle">Are getting married</p>
            <p class="date">16 . 09 . 2026</p>
        </div>
    </header>

    <section id="locations" class="content-section">
        <h2 class="section-title" id="loc-title">The Day</h2>

        <div class="grid">
            <div class="card" onmouseenter="stopSlider('church')" onmouseleave="startSlider('church')">
                <div class="gallery" id="gallery-church">
                    <img src="st_m_pieta.jpg" alt="Church Santa Maria Della Pietà">
                    <img src="https://images.unsplash.com/photo-1548625361-ec8587dcb2d6?auto=format&fit=crop&w=800&q=80"
                        alt="Church Interior">
                </div>
                <div class="card-content">
                    <h3 id="church-title">The Ceremony</h3>
                    <p id="church-desc">Santa Maria della Pietà. Starting at 4:00 PM.</p>
                    <button class="btn-history" id="btn-hist-church" onclick="toggleHistory('church')">View History</button>
                    <div id="history-church" class="history-content">
                        <p id="church-history-text"></p>
                    </div>

                    <div class="map-container">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3152.484218731776!2d13.36952467664654!3d38.114781471901844!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1319e52ede1c4e8b%3A0x58413da94c6fbe36!2sChiesa%20di%20Santa%20Maria%20della%20Piet%C3%A0!5e0!3m2!1sen!2sit!4v1710000000000!5m2!1sen!2sit"
                            width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>

            <div class="card" onmouseenter="stopSlider('venue')" onmouseleave="startSlider('venue')">
                <div class="gallery" id="gallery-venue">
                    <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?auto=format&fit=crop&w=800&q=80"
                        alt="Baglio Culluzia Exterior">
                    <img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=800&q=80"
                        alt="Baglio Culluzia Interior">
                </div>
                <div class="card-content">
                    <h3 id="venue-title">The Party</h3>
                    <p id="venue-desc">Baglio Culluzia, Via Funnuta 9. Dinner and dancing to follow.</p>
                    <button class="btn-history" id="btn-hist-venue" onclick="toggleHistory('venue')">View History</button>
                    <div id="history-venue" class="history-content">
                        <p id="venue-history-text"></p>
                    </div>

                    <div class="map-container">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.642533816672!2d13.41165207664539!3d38.0786960719114!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1319e4f06ffd81c1%3A0xde774736b3a1a18a!2sBaglio%20Culluzia!5e0!3m2!1sen!2sit!4v1710000000001!5m2!1sen!2sit"
                            width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="presents" class="content-section bg-light">
        <h2 class="section-title" id="gifts-title">Gifts & Registry</h2>
        <div class="gifts-content">
            <p id="gifts-desc"></p>
            <div class="iban-box">
                <strong>IBAN:</strong> IT12 A345 6789 0123 4567 8901 234
            </div>
        </div>
    </section>

    <section id="rsvp-section" class="content-section">
        <h2 class="section-title" id="rsvp-title">RSVP</h2>
        <p id="qr-welcome" class="welcome-message"></p>
        <form id="rsvp-form">
            <input type="hidden" id="guest-id" name="guestId">
            <div class="form-group">
                <label id="label-name" for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label id="label-attending" for="attending">Will you join us?</label>
                <select id="attending" name="attending" required>
                    <option value="" disabled selected id="opt-select">Select...</option>
                    <option value="yes" id="opt-yes">Yes!</option>
                    <option value="no" id="opt-no">No</option>
                </select>
            </div>
            <button type="submit" id="btn-submit">Confirm RSVP</button>
            <p id="form-message"></p>
        </form>
    </section>

    <script src="script.js"></script>
</body>

</html>
